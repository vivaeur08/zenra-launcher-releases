<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Zenra - Invitation LAN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- OpenGraph pour Discord -->
  <meta property="og:title" content="Zenra Launcher - Invitation LAN">
  <meta property="og:description" content="🎮 Tu as été invité à rejoindre une partie Minecraft sur Zenra !">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vivaeur08.github.io/zenra-launcher-releases/lan-invite/">
  <meta name="theme-color" content="#7565ff">
  <meta name="description" content="Invitation à rejoindre une partie LAN Minecraft via Zenra Launcher">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #131129 0%, #070914 100%);
      color: #f3f0ff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      padding: 40px;
    }
    .logo {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #7565ff, #9b7cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(117, 101, 255, 0.5);
    }
    .card {
      background: rgba(17, 23, 43, 0.85);
      border: 1px solid rgba(117, 101, 255, 0.4);
      border-radius: 20px;
      padding: 40px 50px;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }
    h1 { margin: 0 0 16px; font-size: 22px; color: #f3f0ff; }
    p { color: #c8cce8; line-height: 1.6; margin: 12px 0; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #7565ff, #9b7cff);
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 10px 30px rgba(117, 101, 255, 0.4);
      transition: transform 180ms ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .small {
      font-size: 12px;
      color: #9ea8d8;
      margin-top: 20px;
    }
    a { color: #9b7cff; }
    code {
      background: rgba(117, 101, 255, 0.15);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="logo">ZENRA</div>
  <div class="card">
    <h1>🎮 Invitation LAN</h1>
    <p>Tu as été invité à rejoindre une partie Minecraft sur Zenra Launcher !</p>
    <p id="redirect-msg">Redirection vers le launcher...</p>

    <a href="#" id="open-btn" class="btn">🚀 Ouvrir Zenra</a>

    <p class="small">
      Si rien ne se passe :<br>
      → Vérifie que <strong>Zenra Launcher</strong> est installé.<br>
      → Sinon, télécharge-le sur <a href="https://github.com/vivaeur08/zenra-launcher-releases">GitHub</a>.
    </p>

    <p class="small" id="manual-code-wrap" style="display:none;">
      <br>
      <strong>Code de secours (à coller dans Zenra) :</strong><br>
      <code id="manual-code"></code>
    </p>
  </div>

  <script>
    // Récupère le payload depuis ?p=... ou depuis le fragment #...
    const params = new URLSearchParams(window.location.search);
    const payload = params.get('p') || window.location.hash.substring(1) || '';

    if (payload) {
      const deepLink = 'zenra://lan-invite/' + payload;
      document.getElementById('open-btn').href = deepLink;

      // Affiche le code de secours
      document.getElementById('manual-code-wrap').style.display = 'block';
      document.getElementById('manual-code').textContent = '[ZENRA-LAN]' + payload;

      // Auto-redirect après 500ms
      setTimeout(() => {
        window.location.href = deepLink;
      }, 800);
    } else {
      document.getElementById('open-btn').textContent = '❌ Lien invalide';
      document.getElementById('open-btn').style.pointerEvents = 'none';
      document.getElementById('open-btn').style.opacity = '0.5';
      document.getElementById('redirect-msg').textContent = 'Aucun payload trouvé dans le lien.';
    }
  </script>
</body>
</html>
